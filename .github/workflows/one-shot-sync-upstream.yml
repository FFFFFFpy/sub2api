name: One-shot upstream sync

on:
  push:
    branches:
      - automation/sync-upstream-2026-07-24

permissions:
  contents: write

concurrency:
  group: one-shot-upstream-sync
  cancel-in-progress: false

jobs:
  sync-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out fork history
        uses: actions/checkout@v4
        with:
          ref: automation/sync-upstream-2026-07-24
          fetch-depth: 0

      - name: Rebase custom commits onto upstream main
        id: sync
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee upstream-sync.log) 2>&1
          set -Eeuo pipefail

          cp tools/port_upstream_sync_fixes.py /tmp/port_upstream_sync_fixes.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch upstream main
          git fetch origin main
          git checkout -B sync/upstream-main upstream/main

          custom_commits=(
            44bc7048fd1a1589a16a3f37742f86d19e227d54
            c70efa699ef6f13b1e2aba57dbfab30732db114f
            6dfffc7833775cc9472c44241e8c05e1554cb19d
          )

          for commit in "${custom_commits[@]}"; do
            echo "=== Replaying ${commit} ==="
            if git cherry-pick -X ours "${commit}"; then
              continue
            fi

            conflicts="$(git diff --name-only --diff-filter=U)"
            if [ -z "${conflicts}" ]; then
              echo "Cherry-pick is empty after upstream changes; skipping."
              git cherry-pick --skip
              continue
            fi

            printf 'Resolving structural conflicts in favor of current upstream:\n%s\n' "${conflicts}"
            while IFS= read -r path; do
              [ -n "${path}" ] || continue
              if git ls-files -u -- "${path}" | awk '$3 == 2 { found=1 } END { exit !found }'; then
                git checkout --ours -- "${path}"
                git add -- "${path}"
              else
                git rm -f --ignore-unmatch -- "${path}"
              fi
            done <<< "${conflicts}"

            if ! GIT_EDITOR=true git cherry-pick --continue; then
              if git status --porcelain=v2 | grep -q '^u '; then
                echo "Unresolved conflicts remain after automatic resolution."
                git status --short
                exit 1
              fi
              echo "Resolved result is empty; skipping commit."
              git cherry-pick --skip
            fi
          done

          test -z "$(git diff --name-only --diff-filter=U)"
          python /tmp/port_upstream_sync_fixes.py

          npm install --global pnpm@9
          pnpm --dir frontend install --lockfile-only

          git add \
            backend/internal/domain/constants.go \
            backend/internal/service/domain_constants.go \
            backend/internal/service/account.go \
            backend/internal/service/openai_gateway_chat_completions_raw.go \
            backend/internal/handler/openai_gateway_handler.go \
            backend/internal/handler/openai_gateway_count_tokens.go \
            backend/internal/handler/openai_embeddings.go \
            backend/internal/handler/openai_rerank.go \
            backend/internal/server/routes/gateway.go \
            frontend/src/components/account/CreateAccountModal.vue \
            frontend/package.json \
            frontend/pnpm-lock.yaml
          git commit -m "fix: port custom routing to latest upstream architecture"

          git merge -s ours --no-ff origin/main -m "Merge fork main history after upstream sync"
          git status --short
          git log --oneline --decorate -12
          git push --force origin HEAD:refs/heads/sync/upstream-main
          mkdir -p validation-logs

      - name: Check deployment script syntax
        id: shellcheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bash -n deploy/apple-container.sh 2>&1 | tee validation-logs/deployment-script.log

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.5'

      - name: Backend unit tests
        id: unit
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          make test-unit 2>&1 | tee ../validation-logs/backend-unit.log

      - name: Backend integration tests
        id: integration
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          make test-integration 2>&1 | tee ../validation-logs/backend-integration.log

      - name: GolangCI-Lint
        id: lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend

      - name: Govulncheck
        id: vuln
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee ../validation-logs/govulncheck.log

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck and critical tests
        id: frontend
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make test-frontend 2>&1 | tee validation-logs/frontend.log

      - name: Frontend audit
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high --json > audit.json || true

      - name: Check frontend audit exceptions
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml \
            2>&1 | tee validation-logs/frontend-audit.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-validation
          path: |
            upstream-sync.log
            validation-logs/
            frontend/audit.json
          if-no-files-found: warn
          retention-days: 3

      - name: Enforce validation results
        if: always()
        shell: bash
        run: |
          cat <<'RESULTS'
          deployment=${{ steps.shellcheck.outcome }}
          unit=${{ steps.unit.outcome }}
          integration=${{ steps.integration.outcome }}
          lint=${{ steps.lint.outcome }}
          govulncheck=${{ steps.vuln.outcome }}
          frontend=${{ steps.frontend.outcome }}
          audit=${{ steps.audit.outcome }}
          RESULTS

          failed=0
          for outcome in \
            '${{ steps.shellcheck.outcome }}' \
            '${{ steps.unit.outcome }}' \
            '${{ steps.integration.outcome }}' \
            '${{ steps.lint.outcome }}' \
            '${{ steps.vuln.outcome }}' \
            '${{ steps.frontend.outcome }}' \
            '${{ steps.audit.outcome }}'; do
            if [ "${outcome}" != "success" ]; then
              failed=1
            fi
          done
          exit "${failed}"
